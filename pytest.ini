[pytest]
# Repo-root pytest config.  Declares the markers used anywhere in the
# test tree so quality.yml's `pytest tests/` invocation doesn't error
# on strict-markers when it walks into tests/harness/.
#
# The harness-local config at tests/harness/pytest.ini overrides this
# with stricter settings when pytest is launched with --rootdir
# pointing there.

markers =
    unit: fast pure-Python tests, no network, no Flask, <1s each
    integration: HTTP round-trip tests, no GPU, no model weights >50MB
    live: real GPU / model weights / cx_Freeze bundle — skipped on CI

# Don't walk into the defect harness when pytest is run at the repo
# root — the harness has its own config/markers and is covered by
# the dedicated defect-harness CI workflow.
norecursedirs = tests/harness .venv build dist node_modules python-embed __pycache__

addopts =
    -ra
    --tb=short
    --timeout=60
    --timeout-method=thread

# Hard deadlines per marker. A unit test that doesn't complete in 60s
# is a bug (in the test or the code).  The three markers override via
# per-test @pytest.mark.timeout(N) where a slower tier is legitimate.
timeout = 60
timeout_method = thread
