# ---------------------------------------------------------------------------
# Nunba-HART Companion -- STAGING full-stack E2E profile
# ---------------------------------------------------------------------------
# Purpose: spin up the real process graph (Flask + llama.cpp + WAMP router)
# so CI can exercise cross-process flows that unit-test `test_client()` mocks
# cannot -- e.g. MCP bearer auth, TTS SSE push, HF supply-chain gate.
#
# Usage (local or CI):
#   docker compose -f docker-compose.staging.yml up -d
#   ./scripts/staging_e2e_probe.sh
#   docker compose -f docker-compose.staging.yml down -v
#
# Boot order: llama + crossbar come up first, nunba depends_on them healthy.
# No GPU assumed -- NUNBA_DISABLE_TTS=1 and TinyLlama 1.1B keep runtime
# under 2GB so this fits GHA's 7GB runner comfortably.
# ---------------------------------------------------------------------------
version: "3.9"

networks:
  nunba-net:
    driver: bridge

volumes:
  llama-models:
  nunba-data:

services:
  # ---- llama.cpp OpenAI-compatible server on :8080 ------------------------
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: nunba-staging-llama
    networks: [nunba-net]
    ports: ["8080:8080"]
    volumes:
      - llama-models:/models
    # TinyLlama 1.1B Q4_K_M -- ~670MB, CPU-runnable, enough for route smoke.
    # Pulled on first boot via HF mirror; cached in named volume afterward.
    command: >
      -hf TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF:Q4_K_M
      --host 0.0.0.0
      --port 8080
      --ctx-size 2048
      --n-gpu-layers 0
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  # ---- Crossbar.io WAMP router on :8088 -----------------------------------
  # Explicit config mount because `CROSSBAR_WEB_PORT` is NOT a standard env
  # var the crossbario/crossbar image honours — the image reads
  # /node/.crossbar/config.json unconditionally, which ships listening on
  # 8080.  The 3m40s healthcheck hang on prior CI runs was because the
  # container bound to 8080 while we probed 8088 → 20 retries × 10s + 30s
  # start-period = failure.  Mounting our own config that explicitly
  # binds to 8088 + realm `realm1` + anonymous role fixes both the port
  # AND the handshake (without a realm/role, WAMP CONNECT fails).
  crossbar:
    image: crossbario/crossbar:latest
    container_name: nunba-staging-crossbar
    networks: [nunba-net]
    ports: ["8088:8088"]
    volumes:
      - ./deploy/staging/crossbar_config.json:/node/.crossbar/config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"127.0.0.1\",8088))'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ---- Nunba Flask app on :5000 -------------------------------------------
  nunba:
    image: python:3.12-slim
    container_name: nunba-staging-app
    networks: [nunba-net]
    ports: ["5000:5000"]
    working_dir: /app
    volumes:
      - .:/app
      - nunba-data:/root/Documents/Nunba
    environment:
      - NUNBA_CI=1
      - NUNBA_DISABLE_TTS=1          # no GPU, no Piper/XTTS download
      - NUNBA_DISABLE_VLM=1           # skip MiniCPM sidecar
      - NUNBA_LLAMA_URL=http://llama:8080
      - NUNBA_CROSSBAR_URL=ws://crossbar:8088/ws
      # main.py:472 sets CBURL=ws://localhost:{NUNBA_WAMP_PORT}/ws but
      # only `if not os.environ.get('CBURL')` — i.e. the env var is the
      # authoritative override.  Staging needs the WAMP client to point
      # at the `crossbar` service hostname instead of localhost.  Same
      # for WAMP_URL (HTTP publish bridge) — there's no separate
      # crossbarhttp3 bridge in this stack, so route HTTP publishes
      # to the Flask app's own /publish endpoint at port 5000.
      - CBURL=ws://crossbar:8088/ws
      - WAMP_URL=http://localhost:5000/publish
      - NUNBA_MCP_BEARER=staging-e2e-token-do-not-use-in-prod
      # Single-instance lock at ~/.nunba/nunba.lock can spuriously fail
      # under containerized restarts (overlayfs flock quirks, healthcheck
      # restart loops re-importing app.py before old fd is GC'd).  The
      # docker container IS the isolation boundary here, so we don't need
      # app-level single-instance protection.  app.py honours this env var
      # as one of the documented skip-keys (see app.py _check_single_instance
      # and the _test_envs tuple).
      - NUNBA_SKIP_SINGLE_INSTANCE=1
      # models/catalog.py imports `integrations.service_tools.model_catalog`
      # from the bundled HARTOS source tree.  Production desktop builds
      # freeze that tree into the Python path; in CI we mount the repo
      # at /app and need to extend PYTHONPATH explicitly so the import
      # resolves.  Without this, e2e-staging crashes at startup with
      # ModuleNotFoundError: No module named 'integrations'.
      - PYTHONPATH=/app/hartos_backend_src
      - PYTHONUNBUFFERED=1
    depends_on:
      llama: { condition: service_healthy }
      crossbar: { condition: service_healthy }
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq --no-install-recommends libsndfile1 curl &&
        pip install --no-cache-dir -r requirements.txt &&
        python main.py --port 5000 --background
      "
    healthcheck:
      # Python-based TCP probe — `python` is always present, `curl`
      # only after apt-get install completes.  Using CMD (list form,
      # no shell) avoids YAML quote-escaping issues that left the
      # previous CMD-SHELL probe stuck in `starting` for all 720s.
      # TCP-only check is more reliable than HTTP /health: it
      # succeeds the moment hypercorn binds the port, regardless
      # of whether the /health endpoint registration finished yet.
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',5000)); s.close()"]
      interval: 15s
      timeout: 10s
      retries: 40
      # pip install of the full requirements.txt takes ~3min on a
      # cold runner; bumping start_period to 5min keeps the unhealthy
      # latch from snapping shut before the Flask app even boots.
      start_period: 300s
