# Ruff — fast Python linter + security scanner
# Replaces flake8, bandit, isort, pyupgrade in a single tool.
# OSS equivalent of Veracode SAST for Python.
#
# Usage:
#   ruff check .          # lint
#   ruff check . --fix    # auto-fix
#   ruff format --check . # format check
target-version = "py312"
line-length = 120

exclude = [
  "build",
  "dist",
  ".venv",
  ".venv.bak",
  "python-embed",
  "hartos_backend_src",
  "hevolve_backend_src",
  "landing-page",
  ".pycharm_plugin",
  "agent_data",
]

[lint]
select = [
  "E",      # pycodestyle errors
  "F",      # pyflakes (unused imports, undefined names)
  "B",      # flake8-bugbear (common bugs, anti-patterns)
  "S",      # bandit security rules (SAST)
  "UP",     # pyupgrade (modern Python idioms)
  "I",      # isort (import ordering)
]
ignore = [
  "E501",   # line too long — too noisy to enforce initially
  "E402",   # import not at top — deferred imports are intentional (splash, frozen build)
  "S101",   # assert usage — fine in non-web code
  "S603",   # subprocess with shell=False — intentional
  "S607",   # partial executable path — intentional for bundled tools
  "S110",   # try-except-pass — will fix incrementally
  "S112",   # try-except-continue — will fix incrementally
  "S301",   # pickle — used by agent_ledger
  "S311",   # random module — used for non-crypto purposes (UI, cache keys)
  "S324",   # hashlib with insecure hash — SHA-256 is fine
  "S108",   # hardcoded tmp directory — desktop app, not server
  "S310",   # urllib.request — intentional for local server health checks
  "S103",   # os.chmod — intentional for installed binary permissions
  "S306",   # mktemp — used by model_catalog atomic save
  "F841",   # unused variable — will fix incrementally
  "F401",   # unused import — will fix incrementally (some are re-exports)
  "F811",   # redefined unused — will fix incrementally
  "B904",   # raise from err — will fix incrementally
  "B007",   # unused loop variable — will fix incrementally
  "B006",   # mutable default argument — will fix incrementally
  "B905",   # zip strict — will fix incrementally
  "E702",   # multiple statements on one line (semicolon) — will fix incrementally
  "E701",   # multiple statements on one line (colon) — will fix incrementally
  "E741",   # ambiguous variable name — will fix incrementally
  "E731",   # lambda assignment — will fix incrementally
  "S113",   # requests without timeout — will fix incrementally
  "S102",   # exec usage — intentional for dynamic code execution
  "S104",   # binding to all interfaces — intentional for local server
  "S602",   # subprocess shell=True — intentional in specific cases
  "S606",   # os.system — intentional in specific cases
  "F821",   # undefined name — false positives from deferred imports
  "B023",   # function uses loop variable — will fix incrementally
  "UP022",  # prefer capture_output — will fix incrementally
  "UP028",  # yield from — will fix incrementally
]

[lint.per-file-ignores]
"tests/*" = ["S"]
"Hevolve_Database/*" = ["S", "E", "F"]
"scripts/setup_freeze_nunba.py" = ["S603", "S607", "I001"]
"test_*.py" = ["S"]

[lint.isort]
known-first-party = [
  "routes",
  "tts",
  "llama",
  "desktop",
]
