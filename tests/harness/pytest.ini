[pytest]
# Scoped pytest config for the defect-reproduction suite.  Kept in
# tests/harness/ so the root repo pytest config is unaffected.
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: fast pure-Python tests, no network, no Flask, <1s each
    integration: Flask test-client HTTP, no GPU, no model weights >50MB
    live: real GPU / model weights / cx_Freeze bundle — skipped in CI

addopts =
    -ra
    --strict-markers
    --tb=short
    --timeout=60
    --timeout-method=thread

# Per-tier time budgets: unit=60s, integration=120s, live=600s.
# Any test exceeding its budget is a hang → report as failure, not
# as silence. Rationale: the earlier parametrised-test hang in this
# session blocked the whole suite invisibly; never again.
timeout = 60
timeout_method = thread
