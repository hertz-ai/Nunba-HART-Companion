[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*

markers =
    journey: end-to-end user journey test — drives real Flask / real MCP / real WAMP

addopts =
    -ra
    --strict-markers
    --tb=short
    --timeout=120
    --timeout-method=thread

timeout = 120
timeout_method = thread
