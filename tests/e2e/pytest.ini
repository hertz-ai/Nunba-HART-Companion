[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*

markers =
    e2e: end-to-end, no stubs — spawns real Flask / subprocess / socket

addopts =
    -ra
    --strict-markers
    --tb=short
    --timeout=120
    --timeout-method=thread
    --cov
    --cov-report=term-missing:skip-covered
    --cov-report=xml

timeout = 120
timeout_method = thread
