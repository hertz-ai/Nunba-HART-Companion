name: Build & Sign Installers

on:
  # Rolling nightly: every push to main produces a fresh `nightly-<sha>-<runid>`
  # release marked --latest=true so docs.hevolve.ai/downloads links like
  # /releases/latest/download/Nunba_Setup.exe always resolve to the newest
  # build between tagged v* releases.  Mirrors the pattern in
  # hertz-ai/HARTOS .github/workflows/release.yml `publish-nightly` job.
  push:
    branches:
      - main
    tags:
      - 'v*'
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      skip_signing:
        description: 'Skip code signing (for test builds)'
        type: boolean
        default: false

# Cancel in-progress runs for the same ref
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Nunba
        uses: actions/checkout@v4

      - name: Checkout hart-backend
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HARTOS
          path: _deps/HARTOS
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout HevolveAI
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HevolveAI
          path: _deps/hevolveai
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout Hevolve_Database
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/Hevolve_Database
          path: _deps/Hevolve_Database
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Verify sibling repos cloned (fork-aware diagnostic)
        shell: bash
        env:
          HAS_PAT: ${{ secrets.HEVOLVE_REPO_TOKEN != '' }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork || github.repository_owner != 'hertz-ai' }}
        run: |
          # Why this gate exists (2026-04-02 silent-failure history):
          # The sibling Checkout steps use continue-on-error:true, so if
          # the default GITHUB_TOKEN lacks repo:read on the private
          # siblings, they no-op and the real failure surfaces 3 steps
          # later as `ModuleNotFoundError: No module named 'sql'` \u2014 opaque
          # to anyone not steeped in the setup.  Fail HERE with a useful
          # diagnostic + action path.
          #
          # 2026-04-24: differentiate fork / contributor builds from
          # internal main-repo builds.  Forks can't access the parent
          # org's secrets by GitHub design, so HEVOLVE_REPO_TOKEN is
          # NEVER present for fork PRs.  Hard-failing those just blocks
          # external contribution.  Instead: emit a ::warning:: so the
          # contributor knows why their installer-build-from-fork can't
          # complete, and point them at the open-sourcing roadmap.
          missing=()
          for repo in HARTOS hevolveai Hevolve_Database; do
            if [ ! -d "_deps/$repo" ] || [ -z "$(ls -A "_deps/$repo" 2>/dev/null)" ]; then
              missing+=("$repo")
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            echo "All sibling repos cloned successfully."
            exit 0
          fi

          if [ "$HAS_PAT" = "false" ]; then
            # Fork / no-PAT path: this is a legitimate state for external
            # contributors.  Warn loudly but don't block the workflow so
            # the contributor gets as far as their changes allow.
            echo "::warning title=Private siblings unavailable (no HEVOLVE_REPO_TOKEN)::"
            echo ""
            echo "HEVOLVE_REPO_TOKEN secret is not available in this build"
            echo "context \u2014 this is expected for:"
            echo "  - pull requests from forks (GitHub blocks secrets on fork PRs)"
            echo "  - external contributor rebuilds on their own fork"
            echo ""
            echo "Missing siblings: ${missing[*]}"
            echo ""
            echo "The installer steps that depend on these siblings will"
            echo "fail further down (notably 'import sql' from Hevolve_Database"
            echo "and hevolveai.* imports).  Your code changes still compile"
            echo "+ lint via the quality.yml workflow, which is the"
            echo "appropriate CI surface for fork PRs."
            echo ""
            echo "Open-sourcing roadmap:"
            echo "  - Hevolve_Database: planned \u2014 unblocks the 'sql' import"
            echo "    chain for fork builds.  Tracked in the Nunba task"
            echo "    backlog as part of the CI-fork-friendly work."
            echo "  - HevolveAI: stays private \u2014 loaded at runtime via the"
            echo "    public hevolvearmor wheel (inside HARTOS)."
            echo ""
            echo "Exiting 0 to let the workflow continue until it hits the"
            echo "actual missing-module boundary."
            exit 0
          fi

          # HAS_PAT=true but clone still failed \u2014 this IS a real error
          # that needs operator action.  Keep the hard-fail posture with
          # the actionable fix path.
          echo "::error title=Sibling repos missing despite HEVOLVE_REPO_TOKEN::"
          echo ""
          echo "HEVOLVE_REPO_TOKEN is set but the Checkout step(s) still"
          echo "did not produce the sibling repos: ${missing[*]}"
          echo ""
          echo "Check:"
          echo "  1. PAT has repo:read scope on hertz-ai/* private repos"
          echo "  2. PAT is not expired (GitHub shows expiry at settings/tokens)"
          echo "  3. PAT owner is still a member of the hertz-ai org"
          echo "  4. The Checkout step logs above for the actual HTTP error"
          echo ""
          echo "Until this resolves the Nunba installer cannot build \u2014"
          echo "build-windows will fail at 'import sql', build-linux at"
          echo "AppImage + hevolve-database install."
          exit 1

      - name: Link sibling repos
        shell: bash
        run: |
          # Build scripts expect ../HARTOS and ../hevolveai as sibling dirs.
          # Windows: use directory junction (mklink /J, no admin needed).
          # Linux/macOS: use symlink.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cmd //c "mklink /J \"$(cygpath -w ../HARTOS)\" \"$(cygpath -w $GITHUB_WORKSPACE/_deps/HARTOS)\"" 2>/dev/null || true
            cmd //c "mklink /J \"$(cygpath -w ../hevolveai)\" \"$(cygpath -w $GITHUB_WORKSPACE/_deps/hevolveai)\"" 2>/dev/null || true
            cmd //c "mklink /J \"$(cygpath -w ../Hevolve_Database)\" \"$(cygpath -w $GITHUB_WORKSPACE/_deps/Hevolve_Database)\"" 2>/dev/null || true
          else
            ln -sf "$GITHUB_WORKSPACE/_deps/HARTOS" ../HARTOS || true
            ln -sf "$GITHUB_WORKSPACE/_deps/hevolveai" ../hevolveai || true
            ln -sf "$GITHUB_WORKSPACE/_deps/Hevolve_Database" ../Hevolve_Database || true
          fi
          ls -la ../HARTOS/pyproject.toml ../hevolveai/ 2>/dev/null || echo "Some sibling repos not available"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-win-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: landing-page\node_modules
          key: node-win-${{ hashFiles('landing-page/package-lock.json') }}
          restore-keys: node-win-

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install Python dependencies + sibling repos
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tail -5

          # Sibling repos are checked out to _deps/<name> by the
          # earlier Checkout steps.  Install from there directly —
          # the mklink junctions in the prior "Link sibling repos"
          # step silently failed on the Windows runner (cygpath +
          # cmd /c quoting), leaving ../HARTOS empty so subsequent
          # `pip install -e ../HARTOS` no-ops and `import sql` blows
          # up at build time.  Pointing pip at _deps/ removes the
          # junction failure point entirely.
          for dep_dir in _deps/hevolveai _deps/HARTOS; do
            if [ -f "$dep_dir/pyproject.toml" ] || [ -f "$dep_dir/setup.py" ]; then
              echo "Installing $(basename $dep_dir) from $dep_dir..."
              pip install --no-deps -e "$dep_dir" 2>&1 | tail -2
            fi
          done

          # Hevolve_Database: try pip install -e first, fall back to .pth
          if [ -f "_deps/Hevolve_Database/setup.py" ]; then
            echo "Installing Hevolve_Database from source (setup.py)..."
            pip install --no-deps -e "_deps/Hevolve_Database" 2>&1 | tail -3
          fi
          # Always create .pth as belt-and-suspenders (editable installs can silently break)
          if [ -d "_deps/Hevolve_Database/sql" ]; then
            SITE_PKG=$(python -c "import site; print(site.getsitepackages()[0])")
            HEVOLVE_DB_PATH=$(cd _deps/Hevolve_Database && pwd)
            echo "$HEVOLVE_DB_PATH" > "$SITE_PKG/hevolve_database.pth"
            echo "Added Hevolve_Database to Python path via .pth: $HEVOLVE_DB_PATH"
            python -c "import sql; print('sql OK:', sql.__file__)"
          else
            echo "WARN: _deps/Hevolve_Database/sql not found — sql module unavailable"
          fi

      - name: Build Nunba app (cx_Freeze + slim)
        run: python scripts/build.py app --skip-wizard
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NUNBA_CI: '1'

      - name: Sign Nunba.exe (Azure Trusted Signing)
        if: ${{ !inputs.skip_signing }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: build\Nunba
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
        continue-on-error: true

      - name: Build installer (Inno Setup)
        run: python scripts/build.py installer

      - name: Sign installer (Azure Trusted Signing)
        if: ${{ !inputs.skip_signing }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: Output
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
        continue-on-error: true

      - name: Smoke test (validate frozen exe)
        run: |
          build\Nunba\Nunba.exe --validate
        timeout-minutes: 5
        continue-on-error: true

      - name: E2E smoke test (start server, hit health endpoint)
        shell: bash
        run: |
          # Start the frozen exe as a server (background)
          build/Nunba/Nunba.exe --server --port 5123 &
          FLASK_PID=$!
          # Wait for health
          for i in $(seq 1 20); do
            if curl -s http://localhost:5123/health > /dev/null 2>&1; then
              echo "Server healthy (attempt $i)"
              # Validate key endpoints
              curl -sf http://localhost:5123/health && echo " [OK] /health"
              curl -sf http://localhost:5123/nunba/info && echo " [OK] /nunba/info"
              curl -sf http://localhost:5123/prompts && echo " [OK] /prompts"
              break
            fi
            sleep 3
          done
          kill $FLASK_PID 2>/dev/null || true
        timeout-minutes: 3
        continue-on-error: true

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Nunba_Setup_Windows
          path: Output/Nunba_Setup.exe
          if-no-files-found: error

  # ============================================================
  # macOS Build
  # ============================================================
  build-macos:
    runs-on: macos-14  # Apple Silicon (M1) runner
    timeout-minutes: 60

    steps:
      - name: Checkout Nunba
        uses: actions/checkout@v4

      - name: Checkout hart-backend
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HARTOS
          path: _deps/HARTOS
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout HevolveAI
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HevolveAI
          path: _deps/hevolveai
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout Hevolve_Database
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/Hevolve_Database
          path: _deps/Hevolve_Database
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true
      - name: Symlink sibling repos
        run: |
          ln -s "$GITHUB_WORKSPACE/_deps/HARTOS" ../HARTOS || true
          ln -s "$GITHUB_WORKSPACE/_deps/hevolveai" ../hevolveai || true
          ln -sf "$GITHUB_WORKSPACE/_deps/Hevolve_Database" ../Hevolve_Database || true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-mac-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: landing-page/node_modules
          key: node-mac-${{ hashFiles('landing-page/package-lock.json') }}
          restore-keys: node-mac-

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies + sibling repos
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tail -5
          for dep_dir in ../hevolveai ../HARTOS; do
            if [ -f "$dep_dir/pyproject.toml" ] || [ -f "$dep_dir/setup.py" ]; then
              echo "Installing $(basename $dep_dir) from source..."
              pip install --no-deps -e "$dep_dir" 2>&1 | tail -2
            fi
          done
          if [ -f "_deps/Hevolve_Database/setup.py" ]; then
            echo "Installing Hevolve_Database from source (setup.py)..."
            pip install --no-deps -e "_deps/Hevolve_Database" 2>&1 | tail -3
          fi
          if [ -d "_deps/Hevolve_Database/sql" ]; then
            SITE_PKG=$(python -c "import site; print(site.getsitepackages()[0])")
            HEVOLVE_DB_PATH=$(cd _deps/Hevolve_Database && pwd)
            echo "$HEVOLVE_DB_PATH" > "$SITE_PKG/hevolve_database.pth"
            echo "Added Hevolve_Database to Python path via .pth: $HEVOLVE_DB_PATH"
            python -c "import sql; print('sql OK:', sql.__file__)"
          else
            echo "WARN: _deps/Hevolve_Database/sql not found — sql module unavailable"
          fi

      - name: Build Nunba
        run: python scripts/build.py full --skip-wizard
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NUNBA_CI: '1'

      - name: Import Apple signing certificate
        if: ${{ !inputs.skip_signing }}
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm certificate.p12
        continue-on-error: true

      - name: Sign and notarize
        if: ${{ !inputs.skip_signing }}
        continue-on-error: true
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: python scripts/build.py sign

      - name: E2E smoke test (start server, hit health endpoint)
        run: |
          # Start the frozen app as a server (background)
          build/Nunba.app/Contents/MacOS/Nunba --server --port 5123 &
          FLASK_PID=$!
          for i in $(seq 1 20); do
            if curl -s http://localhost:5123/health > /dev/null 2>&1; then
              echo "Server healthy (attempt $i)"
              curl -sf http://localhost:5123/health && echo " [OK] /health"
              curl -sf http://localhost:5123/nunba/info && echo " [OK] /nunba/info"
              curl -sf http://localhost:5123/prompts && echo " [OK] /prompts"
              break
            fi
            sleep 3
          done
          kill $FLASK_PID 2>/dev/null || true
        timeout-minutes: 3
        continue-on-error: true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: Nunba_Setup_macOS
          path: Output/Nunba_Setup.dmg
          if-no-files-found: error

  # ============================================================
  # Linux Build
  # ============================================================
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout Nunba
        uses: actions/checkout@v4

      - name: Checkout hart-backend
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HARTOS
          path: _deps/HARTOS
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout HevolveAI
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HevolveAI
          path: _deps/hevolveai
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout Hevolve_Database
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/Hevolve_Database
          path: _deps/Hevolve_Database
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true
      - name: Symlink sibling repos
        run: |
          ln -s "$GITHUB_WORKSPACE/_deps/HARTOS" ../HARTOS || true
          ln -s "$GITHUB_WORKSPACE/_deps/hevolveai" ../hevolveai || true

          ln -sf "$GITHUB_WORKSPACE/_deps/Hevolve_Database" ../Hevolve_Database || true
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-linux-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: landing-page/node_modules
          key: node-linux-${{ hashFiles('landing-page/package-lock.json') }}
          restore-keys: node-linux-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 desktop-file-utils

      - name: Install Python dependencies + sibling repos
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tail -5

          echo "=== Checking sibling repos ==="
          ls -la ../Hevolve_Database/ ../hevolveai/ ../HARTOS/ 2>&1 | head -20
          echo "=== Installing sibling deps ==="
          for dep_dir in ../hevolveai ../HARTOS; do
            if [ -f "$dep_dir/pyproject.toml" ] || [ -f "$dep_dir/setup.py" ]; then
              echo "Installing $(basename $dep_dir) from $dep_dir..."
              pip install --no-deps -e "$dep_dir" 2>&1 | tail -3
            else
              echo "SKIP $dep_dir — no pyproject.toml or setup.py found"
              ls -la "$dep_dir/" 2>&1 | head -5
            fi
          done

          # Hevolve_Database: try pip install -e first, fall back to .pth
          if [ -f "_deps/Hevolve_Database/setup.py" ]; then
            echo "Installing Hevolve_Database from source (setup.py)..."
            pip install --no-deps -e "_deps/Hevolve_Database" 2>&1 | tail -3
          fi
          # Always create .pth as belt-and-suspenders (editable installs can silently break)
          if [ -d "_deps/Hevolve_Database/sql" ]; then
            SITE_PKG=$(python -c "import site; print(site.getsitepackages()[0])")
            HEVOLVE_DB_PATH=$(realpath _deps/Hevolve_Database)
            echo "$HEVOLVE_DB_PATH" > "$SITE_PKG/hevolve_database.pth"
            echo "Added Hevolve_Database to Python path via .pth: $HEVOLVE_DB_PATH"
          fi

          echo "=== Verify imports ==="
          python -c "import sql; print('sql OK:', sql.__file__)" 2>&1 || echo "WARN: sql not importable"
          python -c "import hevolveai; print('hevolveai OK')" 2>&1 || echo "WARN: hevolveai not importable"
          python -c "import hart_intelligence; print('hart_intelligence OK')" 2>&1 || echo "WARN: hart_intelligence not importable"

      - name: Build Nunba app (cx_Freeze)
        run: python scripts/build.py app --skip-wizard
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NUNBA_CI: '1'

      - name: E2E smoke test (start server, hit health endpoint)
        run: |
          build/Nunba/Nunba --server --port 5123 &
          FLASK_PID=$!
          for i in $(seq 1 20); do
            if curl -s http://localhost:5123/health > /dev/null 2>&1; then
              echo "Server healthy (attempt $i)"
              curl -sf http://localhost:5123/health && echo " [OK] /health"
              curl -sf http://localhost:5123/nunba/info && echo " [OK] /nunba/info"
              curl -sf http://localhost:5123/prompts && echo " [OK] /prompts"
              break
            fi
            sleep 3
          done
          kill $FLASK_PID 2>/dev/null || true
        timeout-minutes: 3
        continue-on-error: true

      - name: Package as AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p Nunba.AppDir/usr/bin Nunba.AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/Nunba/* Nunba.AppDir/usr/bin/

          cat > Nunba.AppDir/nunba.desktop << 'EOF'
          [Desktop Entry]
          Name=Nunba
          Comment=Your AI Guardian Angel — Companion App for HART OS
          Exec=Nunba
          Icon=nunba
          Type=Application
          Categories=Utility;Education;ArtificialIntelligence;
          EOF

          if [ -f assets/icon.png ]; then
            cp assets/icon.png Nunba.AppDir/usr/share/icons/hicolor/256x256/apps/nunba.png
          else
            convert -size 256x256 xc:purple Nunba.AppDir/usr/share/icons/hicolor/256x256/apps/nunba.png 2>/dev/null || true
          fi
          # Previous line tried `cp Nunba.AppDir/nunba.desktop Nunba.AppDir/`
          # which is a self-copy — bash errors with "same file".  The
          # .desktop file is already at the AppDir root (line 522's
          # `cat > Nunba.AppDir/nunba.desktop`), which is where
          # appimagetool expects it.  No copy needed.
          ln -sf usr/share/icons/hicolor/256x256/apps/nunba.png Nunba.AppDir/nunba.png

          cat > Nunba.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/bin/Nunba" "$@"
          APPRUN
          chmod +x Nunba.AppDir/AppRun

          ARCH=x86_64 ./appimagetool-x86_64.AppImage Nunba.AppDir Output/Nunba-x86_64.AppImage
        env:
          ARCH: x86_64

      - name: Build .deb package
        run: |
          mkdir -p nunba-deb/DEBIAN
          mkdir -p nunba-deb/usr/bin
          mkdir -p nunba-deb/usr/share/applications
          mkdir -p nunba-deb/usr/share/icons/hicolor/256x256/apps

          cp -r build/Nunba/* nunba-deb/usr/bin/

          VERSION=$(python -c "import hart_version; print(hart_version.VERSION)" 2>/dev/null || echo "1.0.0")
          cat > nunba-deb/DEBIAN/control << CTRL
          Package: nunba
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Hevolve AI <legal@hevolve.ai>
          Description: Nunba — AI Guardian Angel Companion App
           Your personal AI companion that runs on HART OS.
           Chat, device control, vision, TTS/STT — all local.
          CTRL

          cp Nunba.AppDir/nunba.desktop nunba-deb/usr/share/applications/ 2>/dev/null || true

          dpkg-deb --build nunba-deb Output/nunba_${VERSION}_amd64.deb
        continue-on-error: true

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Nunba_Setup_Linux_AppImage
          path: Output/Nunba-x86_64.AppImage
          if-no-files-found: error

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: Nunba_Setup_Linux_deb
          path: Output/nunba_*.deb
          if-no-files-found: warn

  # ============================================================
  # Create GitHub Release (only on tags)
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/Nunba_Setup_Windows/Nunba_Setup.exe
            artifacts/Nunba_Setup_macOS/Nunba_Setup.dmg
            artifacts/Nunba_Setup_Linux_AppImage/Nunba-x86_64.AppImage
            artifacts/Nunba_Setup_Linux_deb/nunba_*.deb

  # ============================================================
  # Publish Rolling Nightly Release (every push to main)
  # ============================================================
  #
  # Mirrors the pattern in hertz-ai/HARTOS .github/workflows/release.yml
  # publish-nightly job (lines 462-567): every push to main produces a
  # fresh `nightly-<sha>-<runid>` release marked --latest=true, so
  # docs.hevolve.ai/downloads links like
  #   https://github.com/hertz-ai/Nunba/releases/latest/download/Nunba_Setup.exe
  # always resolve to the newest build between signed v* tags.
  #
  # Why unique-per-run tag instead of reusing "nightly":
  # GitHub's immutable-release feature permanently reserves any tag name
  # used for a published release — reusing "nightly" would 422 on
  # subsequent publishes.  github.run_id makes the tag unique even under
  # "Re-run all jobs" of the same commit.  Old nightly-* releases are
  # pruned to newest 3.
  #
  # `if: always()` so partial build success (e.g. macOS codesigning flakes
  # but Windows + Linux complete) still ships the artifacts that did build.
  publish-nightly:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-artifacts
          pattern: Nunba_Setup_*
          merge-multiple: true

      - name: Create unique-tagged nightly release, upload, publish as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_ID="${{ github.run_id }}"
          TAG="nightly-${SHORT_SHA}-${RUN_ID}"

          echo "=== Artifacts downloaded ==="
          ls -la /tmp/all-artifacts/ || { echo "No artifacts dir"; exit 0; }
          FILES=$(find /tmp/all-artifacts -maxdepth 2 -type f | wc -l)
          if [[ "$FILES" -eq 0 ]]; then
            echo "No installer artifacts produced by any build-* job — nothing to publish"
            exit 0
          fi

          echo "=== Creating $TAG DRAFT (mutable while draft) ==="
          gh release create "$TAG" \
            --repo "$REPO" \
            --target "$SHA" \
            --draft \
            --prerelease \
            --title "Nunba nightly ${SHORT_SHA}" \
            --notes "Rolling bleeding-edge build from \`main\` @ ${SHORT_SHA} on every push. For signed stable installers see the [vX.Y.Z release archive](https://github.com/${REPO}/releases)."

          echo "=== Uploading artifacts ==="
          find /tmp/all-artifacts -maxdepth 2 -type f | while read -r f; do
            echo "  -> $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "$REPO" --clobber
          done

          echo "=== Publishing as latest (immutable after publish) ==="
          gh release edit "$TAG" --repo "$REPO" \
            --draft=false --latest=true --prerelease=false

          echo "=== Pruning old nightly-* releases (keep newest 3) ==="
          gh api "repos/${REPO}/releases" --paginate \
            --jq '.[] | select(.tag_name | startswith("nightly-")) | {tag:.tag_name, created:.created_at}' \
            | jq -s 'sort_by(.created) | reverse | .[3:] | .[].tag' -r \
            | while read -r OLD_TAG; do
              [[ -n "$OLD_TAG" && "$OLD_TAG" != "$TAG" ]] && {
                echo "  pruning $OLD_TAG"
                gh release delete "$OLD_TAG" --repo "$REPO" --yes --cleanup-tag 2>/dev/null || true
              }
            done

          echo "=== Done ==="
          gh api "repos/${REPO}/releases/latest" \
            --jq '{tag:.tag_name, assets:[.assets[].name], published:.published_at}' || true
