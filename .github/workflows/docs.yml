name: Deploy Docs & Test Reports

on:
  push:
    branches: [main]
  # Allow manual trigger (useful for regenerating reports)
  workflow_dispatch:

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ── Build MkDocs documentation ──
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/

  # ── Run Cypress E2E tests with full backend ──
  test-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Checkout hart-backend
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HARTOS
          path: _deps/HARTOS
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout HevolveAI (source, if accessible)
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HevolveAI
          path: _deps/hevolveai
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout Hevolve_Database
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/Hevolve_Database
          path: _deps/Hevolve_Database
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Symlink sibling repos
        run: |
          ln -sf "$GITHUB_WORKSPACE/_deps/HARTOS" ../HARTOS || true
          ln -sf "$GITHUB_WORKSPACE/_deps/hevolveai" ../hevolveai || true
          ln -sf "$GITHUB_WORKSPACE/_deps/Hevolve_Database" ../Hevolve_Database || true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install Python backend + all transitive dependencies
      # Uses the same install logic as scripts/build.py:
      #   1. Local sibling source (if checkout succeeded)
      #   2. Compiled wheel from HARTOS (if source unavailable)
      #   3. pip install from requirements.txt as baseline
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt 2>&1 | tail -5

          # Install sibling deps in order (same as build.py):
          # hevolve-database → hevolveai → hart-backend
          for dep_dir in ../Hevolve_Database ../hevolveai ../HARTOS; do
            if [ -f "$dep_dir/pyproject.toml" ] || [ -f "$dep_dir/setup.py" ]; then
              echo "Installing $(basename $dep_dir) from source..."
              pip install --no-deps "$dep_dir" 2>&1 | tail -2
            fi
          done

          # Fallback: if hevolveai source not available, try compiled wheel
          if ! python -c "import hevolveai" 2>/dev/null; then
            if [ -d ../HARTOS/scripts/build_compiled_wheel.py ]; then
              echo "hevolveai source unavailable — building compiled wheel..."
              python ../HARTOS/scripts/build_compiled_wheel.py --all 2>&1 | tail -5
              pip install dist/embodied_ai-*.whl 2>/dev/null || true
            fi
          fi

      # Build React frontend
      - name: Install frontend dependencies
        working-directory: landing-page
        run: npm ci --legacy-peer-deps

      - name: Build React (production)
        working-directory: landing-page
        run: npx react-app-rewired build
        env:
          CI: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'

      # Start Flask backend serving the React build (headless, no GUI)
      - name: Start Nunba backend
        run: |
          # Start main.py directly (Flask only, no Tk/webview GUI)
          # app.py needs tkinter/pywebview which aren't on CI runners
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ['HEVOLVE_NODE_TIER'] = 'flat'
          os.environ['HEVOLVE_DEV_MODE'] = 'true'
          from main import app
          from waitress import serve
          serve(app, host='127.0.0.1', port=5000, threads=4)
          " &
          # Wait for Flask to be ready (up to 60s for heavy imports)
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:5000/cors/test > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "WARNING: Backend did not start within 60s"
            fi
            sleep 1
          done

      # Run Cypress E2E tests against the full stack
      - name: Run Cypress E2E tests
        working-directory: landing-page
        run: npx cypress run --browser chrome
        continue-on-error: true
        env:
          CYPRESS_BASE_URL: 'http://localhost:5000'

      # Generate NYC coverage report
      - name: Generate coverage report
        working-directory: landing-page
        run: |
          npx nyc report --reporter=html --report-dir=coverage
        continue-on-error: true

      # Upload test report
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            landing-page/cypress/reports/
            landing-page/cypress/screenshots/
        if: always()

      # Upload coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: landing-page/coverage/
        if: always()

  # ── Combine and deploy to GitHub Pages ──
  deploy:
    needs: [build-docs, test-reports]
    if: always() && needs.build-docs.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site/

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: site/test-reports/
        continue-on-error: true

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: site/coverage/
        continue-on-error: true

      # Create an index page linking docs, reports, and coverage
      - name: Create reports index
        run: |
          cat > site/reports.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Nunba - Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0F0E17; color: #e0e0e0; }
              h1 { color: #6C63FF; }
              a { color: #6C63FF; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .card { background: #1A1A2E; border-radius: 12px; padding: 24px; margin: 16px 0; }
              .card h2 { margin-top: 0; color: #fff; }
              .card p { color: #999; }
            </style>
          </head>
          <body>
            <h1>Nunba Reports</h1>
            <div class="card">
              <h2><a href="./">Documentation</a></h2>
              <p>Setup guides, architecture, API reference</p>
            </div>
            <div class="card">
              <h2><a href="./test-reports/">E2E Test Report</a></h2>
              <p>Cypress Mochawesome HTML report with pass/fail details and screenshots</p>
            </div>
            <div class="card">
              <h2><a href="./coverage/">Code Coverage</a></h2>
              <p>Istanbul/NYC coverage report showing tested lines, branches, and functions</p>
            </div>
          </body>
          </html>
          INDEXEOF

      - name: Upload combined site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
