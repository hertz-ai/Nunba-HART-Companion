name: Regression (all tiers)

# Single workflow that invokes scripts/run_all_regression.sh so the
# CI view matches what a developer runs locally. Aggregates every
# tier's pass/fail into one job result.
#
# Intentionally does NOT replace quality.yml or defect-harness.yml —
# those stay as lens-specific runs (hard gates for code quality,
# dedicated harness tracking). This job is the consolidated view.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_live:
        description: 'Run @live tier (requires GPU / bundle; fails on hosted runners)'
        required: false
        default: 'false'
        type: boolean

jobs:
  regression:
    name: all-tiers / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      NUNBA_LIVE: ${{ (github.event_name == 'workflow_dispatch' && inputs.include_live == 'true') && '1' || '0' }}
      NUNBA_CYPRESS: '0'
      NUNBA_STAGING: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-html pytest-xdist flask flask-cors requests

      - name: Run all regression tiers (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/run_all_regression.sh
          ./scripts/run_all_regression.sh

      - name: Run all regression tiers (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: scripts\run_all_regression.bat

      - name: Upload any produced test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-${{ matrix.os }}
          path: |
            test-report-*.html
            harness-results-*.xml
          if-no-files-found: ignore
          retention-days: 30
