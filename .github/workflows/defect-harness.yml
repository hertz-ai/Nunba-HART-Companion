name: Defect Reproduction Harness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  harness:
    name: harness / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps (minimal — no torch, no CUDA, no GPU TTS)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist pytest-timeout
          # Minimal surface for import graphs under test — DO NOT pull heavy
          # deps like torch/transformers/parler_tts in CI. unit tier is AST
          # + string-grep over source; integration uses Flask test-client.
          pip install flask flask-cors requests || true

      - name: Run unit + integration tiers (live tier skipped on CI)
        shell: bash
        run: |
          cd tests/harness
          python -m pytest -m "unit or integration" -v -q \
            --junitxml=../../harness-results-${{ matrix.os }}.xml || exit_code=$?
          echo "pytest exit=$exit_code"
          # Keep the job green for the RED-first TDD phase: tests are
          # expected to fail here until Phase 5 fixes land.  We publish
          # the JUnit XML either way so dashboards track progress.
          exit 0

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-results-${{ matrix.os }}
          path: harness-results-*.xml
          retention-days: 30
