name: Code Quality & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ── Python: Linting + Security Scanning ──
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Ruff: lint + security (bandit S rules = OSS Veracode SAST)
      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint (includes bandit security scan)
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check . || true  # Advisory initially

      # pytest: Backend unit tests (mocked — no running servers required)
      - name: Install test dependencies
        run: pip install pytest pytest-html flask requests

      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short --html=test-report.html --self-contained-html
        continue-on-error: true  # Advisory — stabilize then enforce

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: test-report.html

      # pip-audit: dependency vulnerability scanner (OSS Snyk equivalent)
      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc 2>&1 || true
        continue-on-error: true  # Advisory — harden after initial triage

  # ── Frontend: Linting + Jest Unit Tests + Dependency Audit ──
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-page
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npx eslint src/ --max-warnings 50 --ext .js,.jsx 2>&1 || true
        continue-on-error: true  # Advisory — reduce max-warnings over time

      - name: Jest unit tests
        run: npx react-scripts test --watchAll=false --ci --forceExit --coverage
        env:
          CI: true

      - name: Upload Jest coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: landing-page/coverage/

      # npm audit: dependency vulnerability scanner
      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high 2>&1 || true
        continue-on-error: true

  # ── Cypress E2E Tests ──
  # Uses React dev server (port 3000) with backend calls stubbed via cy.intercept.
  # No Flask/HARTOS server needed — tests verify frontend behavior only.
  # For full-stack E2E, run locally with Nunba + `npx cypress run`.
  cypress-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-page
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Start React dev server in background.
      # Cypress baseUrl is localhost:3000 (React dev server).
      # Backend API calls (localhost:5000) are stubbed in cy.intercept
      # or gracefully handled with failOnStatusCode: false.
      - name: Start React dev server
        run: npm start &
        env:
          BROWSER: none  # Don't open browser
          PORT: 3000

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 60000

      # Run Cypress in chunks to avoid OOM on CI runners.
      # Specs that require a live Flask backend are tagged with
      # failOnStatusCode: false and degrade gracefully.
      - name: Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: landing-page
          install: false  # Already installed above
          wait-on: http://localhost:3000
          wait-on-timeout: 60
          browser: chrome
          config: baseUrl=http://localhost:3000,video=false
          # Run all specs — backend-dependent tests use failOnStatusCode:false
          # and cy.request with status acceptance so they pass without Flask
          record: false
        env:
          CI: true

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: landing-page/cypress/screenshots/

      - name: Upload Cypress reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: landing-page/cypress/reports/
