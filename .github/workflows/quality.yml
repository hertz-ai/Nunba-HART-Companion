name: Code Quality & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ── Python: Linting + Security Scanning ──
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Ruff: lint + security (bandit S rules = OSS Veracode SAST)
      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint (includes bandit security scan)
        run: ruff check .
        # HARD GATE — lint + security must pass

      - name: Ruff format check
        run: ruff format --check . || true  # Advisory — auto-format differences are not blocking

      # pytest: Backend unit tests (mocked — no running servers required)
      - name: Install test dependencies
        run: pip install pytest pytest-html flask requests

      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short --html=test-report.html --self-contained-html
        # HARD GATE — test failures block merge

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: test-report.html

      # pip-audit: dependency vulnerability scanner (OSS Snyk equivalent)
      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc 2>&1 || true
        continue-on-error: true  # Advisory — high/critical CVEs tracked manually

  # ── Frontend: Linting + Jest Unit Tests + Dependency Audit ──
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-page
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ESLint
        run: npx eslint src/ --max-warnings 50 --ext .js,.jsx
        # HARD GATE — max 50 warnings, zero errors

      - name: Jest unit tests
        run: npx react-scripts test --watchAll=false --ci --forceExit --coverage
        env:
          CI: true
        # HARD GATE — test failures block merge

      - name: Upload Jest coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: landing-page/coverage/

      # npm audit: dependency vulnerability scanner
      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high 2>&1 || true
        continue-on-error: true  # Advisory — tracked manually for high/critical

  # ── Cypress E2E Tests ──
  # Full-stack: Flask backend (port 5000) + React dev server (port 3000).
  # HARTOS is pip-installed. SQLite for DB (no external services needed).
  cypress-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Checkout HARTOS
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HARTOS
          path: _deps/HARTOS
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout HevolveAI
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/HevolveAI
          path: _deps/hevolveai
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout Hevolve_Database
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/Hevolve_Database
          path: _deps/Hevolve_Database
          token: ${{ secrets.HEVOLVE_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Symlink sibling repos
        run: |
          ln -sf "$GITHUB_WORKSPACE/_deps/HARTOS" ../HARTOS || true
          ln -sf "$GITHUB_WORKSPACE/_deps/hevolveai" ../hevolveai || true
          ln -sf "$GITHUB_WORKSPACE/_deps/Hevolve_Database" ../Hevolve_Database || true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: landing-page/package-lock.json

      # ── Backend: Flask + HARTOS (from source) ──
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tail -5

          # Install sibling deps in order: hevolve-database → hevolveai → hart-backend
          for dep_dir in ../Hevolve_Database ../hevolveai ../HARTOS; do
            if [ -f "$dep_dir/pyproject.toml" ] || [ -f "$dep_dir/setup.py" ]; then
              echo "Installing $(basename $dep_dir) from source..."
              pip install --no-deps "$dep_dir" 2>&1 | tail -2
            fi
          done
        continue-on-error: true  # Some platform-specific deps may fail on Linux

      - name: Start Flask backend
        run: |
          python main.py --port 5000 &
          echo $! > /tmp/flask.pid
        env:
          NUNBA_BIND_HOST: '127.0.0.1'
          NUNBA_DISABLE_TTS: '1'  # No TTS models on CI
          NUNBA_CI: '1'

      - name: Wait for Flask backend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/health > /dev/null 2>&1; then
              echo "Flask is ready (attempt $i)"
              break
            fi
            echo "Waiting for Flask... (attempt $i)"
            sleep 2
          done
          curl -sf http://localhost:5000/health || echo "Flask health check returned non-200 (may still work)"

      # ── Frontend: Build React and let Flask serve it (bundled mode) ──
      - name: Install frontend dependencies
        working-directory: landing-page
        run: npm ci --legacy-peer-deps

      - name: Build React (production)
        working-directory: landing-page
        run: npx react-app-rewired build
        env:
          CI: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ── Cypress: Bundled mode (Flask serves React on :5000) ──
      # continue-on-error: UI timing failures on free CI runners are expected.
      # The pass rate is tracked in reports — not used as a gate.
      - name: Cypress E2E tests
        continue-on-error: true
        uses: cypress-io/github-action@v6
        with:
          working-directory: landing-page
          install: false
          wait-on: http://localhost:5000
          wait-on-timeout: 120
          browser: chrome
          config: baseUrl=http://localhost:5000,video=false
          record: false
        env:
          CI: true

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: landing-page/cypress/screenshots/

      - name: Upload Cypress reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: landing-page/cypress/reports/

      - name: Stop Flask backend
        if: always()
        run: kill $(cat /tmp/flask.pid) 2>/dev/null || true
