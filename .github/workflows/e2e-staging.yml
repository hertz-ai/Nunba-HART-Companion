# ---------------------------------------------------------------------------
# e2e-staging.yml -- full-stack live HTTP probe job
# ---------------------------------------------------------------------------
# Spins up docker-compose.staging.yml (Flask + llama.cpp + crossbar), waits
# for healthy, runs scripts/staging_e2e_probe.sh against real endpoints, and
# uploads docker logs on failure.
#
# Catches the class of regression unit tests can't -- cross-process auth,
# bearer token flow, HF supply-chain gate, thread-dump endpoint, WAMP wire.
# ---------------------------------------------------------------------------
name: e2e-staging

on:
  push:
    branches: [main, test-local-deployment-with-gpu]
  pull_request:
    branches: [main, test-local-deployment-with-gpu]
  schedule:
    - cron: "0 6 * * *"    # nightly 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: e2e-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # hartos_backend_src/ is .gitignored — developers `git clone` HARTOS
      # into it manually for desktop builds.  CI does the same here so
      # models/catalog.py and the rest of the HARTOS shim layer can
      # resolve `import integrations.service_tools.model_catalog` once
      # PYTHONPATH=/app/hartos_backend_src kicks in (set in the staging
      # compose file).  Uses HEVOLVE_REPO_TOKEN (org PAT) so the clone
      # works whether HARTOS is private or public.
      - name: Clone HARTOS source into hartos_backend_src/
        env:
          GH_TOKEN: ${{ secrets.HEVOLVE_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/hertz-ai/HARTOS.git" \
            hartos_backend_src
          echo "HARTOS source layout (top-level):"
          ls hartos_backend_src | head -20

      - name: Install jq + curl (probe deps)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq curl

      - name: Docker compose version
        run: docker compose version

      - name: Start staging stack
        run: |
          docker compose -f docker-compose.staging.yml up -d --pull always
          echo "Stack launched. PID table:"
          docker compose -f docker-compose.staging.yml ps

      - name: Wait for nunba healthy (max 12 min)
        # Bumped from 8min to 12min: the staging container does pip
        # install of the full requirements.txt on every boot (~3min)
        # plus the Flask app's own startup (~30s).  Combined with the
        # docker healthcheck's 5min start_period, the previous 8min
        # cap occasionally clipped real green runs.
        run: |
          for i in $(seq 1 72); do
            status=$(docker inspect --format '{{.State.Health.Status}}' nunba-staging-app 2>/dev/null || echo starting)
            echo "  [$i/72] nunba: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 10
          done
          echo "::error::nunba never reached healthy state"
          docker compose -f docker-compose.staging.yml ps
          docker compose -f docker-compose.staging.yml logs --no-color --timestamps nunba | tail -200
          exit 1

      - name: Verify Nunba route surface
        env:
          NUNBA_BASE: http://localhost:5000
          NUNBA_MCP_BEARER: staging-e2e-token-do-not-use-in-prod
        run: |
          set -euo pipefail
          echo "=== /status ==="
          curl -fsS "$NUNBA_BASE/status"
          echo
          echo "=== required route presence ==="
          routes_json="$(curl -fsS \
            -H "Authorization: Bearer $NUNBA_MCP_BEARER" \
            "$NUNBA_BASE/debug/routes")"
          printf '%s' "$routes_json" | jq -r '.[].rule' | sort > /tmp/nunba-routes.txt
          required=(
            /health
            /api/mcp/local/health
            /api/mcp/local/tools/execute
            /api/admin/models/hub/install
            /api/admin/diag/thread-dump
            /backend/health
          )
          missing=0
          for route in "${required[@]}"; do
            if grep -Fxq "$route" /tmp/nunba-routes.txt; then
              echo "OK $route"
            else
              echo "::error::missing route $route"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "=== registered routes around api/admin/backend/mcp/health ==="
            grep -E '^(/health|/backend/|/api/(admin|mcp)/)' /tmp/nunba-routes.txt || true
            echo "=== nunba logs ==="
            docker compose -f docker-compose.staging.yml logs --no-color --timestamps nunba | tail -200
            exit 1
          fi

      - name: Run live HTTP probes
        env:
          NUNBA_BASE: http://localhost:5000
          NUNBA_MCP_BEARER: staging-e2e-token-do-not-use-in-prod
        run: |
          chmod +x scripts/staging_e2e_probe.sh
          ./scripts/staging_e2e_probe.sh

      - name: Capture logs on failure
        if: failure()
        run: |
          mkdir -p _logs
          docker compose -f docker-compose.staging.yml logs --no-color --timestamps > _logs/compose.log 2>&1 || true
          docker inspect nunba-staging-app   > _logs/nunba.inspect.json   2>&1 || true
          docker inspect nunba-staging-llama > _logs/llama.inspect.json   2>&1 || true
          docker inspect nunba-staging-crossbar > _logs/crossbar.inspect.json 2>&1 || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-staging-logs-${{ github.run_id }}
          path: _logs/
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.staging.yml down -v --remove-orphans
