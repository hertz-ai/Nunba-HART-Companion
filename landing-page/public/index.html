    <!-- Inline critical splash styles — renders BEFORE any external CSS loads -->
    <style>
      /* Loader matches the hero's base look: black bg + drifting brand
         particles.  When React mounts and the hero renders, the only
         visible change is the hero content fading in — the background
         field is already there, so there's no jarring cut from
         "logo+spinner on flat bg" to "particle hero". */
      #pre-react-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: black;
        overflow: hidden;
      }
      #pre-react-loader.hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .pre-loader-particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }
      .pre-loader-particles span {
        position: absolute;
        border-radius: 50%;
        animation: particleFloat 18s ease-in-out infinite;
      }
      @keyframes particleFloat {
        0%, 100% { transform: translateY(0) scale(1); }
        33% { transform: translateY(-8px) scale(1.15); }
        66% { transform: translateY(4px) scale(0.9); }
      }
      #pre-react-loader > img,
      #pre-react-loader > .loader-spinner,
      #pre-react-loader > .loader-timeout {
        position: relative;
        z-index: 1;
      }
      @keyframes nunba-spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Timeout fallback — shows retry message if React never mounts within 12s */
      #pre-react-loader .loader-timeout {
        display: none;
        text-align: center;
        animation: nunba-fade-in 0.4s ease both;
      }
      #pre-react-loader.stalled .loader-timeout {
        display: block;
      }
      #pre-react-loader.stalled .loader-spinner {
        display: none;
      }
      @keyframes nunba-fade-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .loader-retry-btn {
        background: linear-gradient(135deg, #6c63ff, #9b94ff);
        color: #fff;
        border: none;
        padding: 10px 28px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 12px;
        transition: opacity 0.2s;
      }
      .loader-retry-btn:hover {
        opacity: 0.85;
      }
      .loader-status {
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        margin-top: 8px;
        font-family: system-ui, sans-serif;
      }
    </style>

    <div style="background: black; min-height: 100vh" id="root"></div>

    <script>
      // Hide splash once React ACTUALLY mounts (not just a <style> tag)
      var _reactMounted = false;
      var _mo = new MutationObserver(function () {
        var r = document.getElementById('root');
        if (!r) return;
        // Check for real React content — skip <style>, <script>, <noscript> tags
        var hasContent = false;
        for (var i = 0; i < r.children.length; i++) {
          var tag = r.children[i].tagName;
          if (tag !== 'STYLE' && tag !== 'SCRIPT' && tag !== 'NOSCRIPT') {
            // Must have meaningful innerHTML (not just an empty div)
            if (r.children[i].innerHTML.length > 50) {
              hasContent = true;
              break;
            }
          }
        }
        if (hasContent) {
          _reactMounted = true;
          var s = document.getElementById('pre-react-loader');
          if (s) {
            s.classList.add('hidden');
            setTimeout(function () {
              s.remove();
            }, 350);
          }
          _mo.disconnect();
        }
      });
      _mo.observe(document.getElementById('root'), {childList: true, subtree: true});

      // Timeout: if React hasn't mounted in 12s, show retry UI
      setTimeout(function () {
        if (_reactMounted) return;
        var loader = document.getElementById('pre-react-loader');
        if (loader) {
          loader.classList.add('stalled');
          // Check if server is reachable
          fetch('/cors/test', {method: 'GET'})
            .then(function (r) {
              if (r.ok) {
                var st = document.getElementById('loader-status-text');
                if (st)
                  st.textContent =
                    'Server is running. App may have encountered an error.';
              }
            })
            .catch(function () {
              var st = document.getElementById('loader-status-text');
              if (st)
                st.textContent = 'Server is starting up... Reload to retry.';
            });
        }
      }, 12000);
    </script>
